<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MLB 2026 Picks Journal | Results</title>
  <meta name="description" content="Past MLB games with your pick and the final outcome." />
  <style>
    :root{
      --bg0:#ffffff;
      --bg1:#f3f4f6;
      --card:rgba(255,255,255,.62);
      --stroke:rgba(0,0,0,.08);
      --text:#0b0b0c;
      --muted:rgba(0,0,0,.62);
      --shadow: 0 18px 45px rgba(0,0,0,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color:var(--text);
      background:
        radial-gradient(900px 500px at 15% 10%, rgba(0,0,0,.05), transparent 60%),
        radial-gradient(900px 500px at 85% 20%, rgba(0,0,0,.04), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
    }
    .wrap{max-width:1100px;margin:0 auto;padding:28px 18px 40px}

    header{
      display:flex;gap:14px;align-items:center;justify-content:space-between;
      padding:14px 14px 18px;
    }
    .brand{display:flex;gap:12px;align-items:center}
    .mark{
      width:38px;height:38px;border-radius:12px;
      background:linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.03));
      border:1px solid rgba(0,0,0,.08);
      box-shadow: 0 10px 24px rgba(0,0,0,.08);
    }
    h1{font-size:18px;margin:0;letter-spacing:.2px}
    .sub{font-size:12.5px;color:var(--muted);margin-top:2px}

    nav{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .pill{
      display:inline-flex;align-items:center;gap:8px;
      padding:10px 12px;border-radius:999px;
      border:1px solid rgba(0,0,0,.08);
      background:rgba(255,255,255,.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      text-decoration:none;color:var(--text);
      box-shadow: 0 10px 24px rgba(0,0,0,.05);
      font-size:13px;
    }
    .pill.active{background:rgba(0,0,0,.07)}
    .pill small{color:var(--muted);font-size:12px}

    .topbar{
      display:flex;gap:10px;align-items:center;justify-content:space-between;
      padding:0 14px 18px;
      flex-wrap:wrap;
    }
    .search{
      flex:1;display:flex;gap:10px;align-items:center;max-width:560px;
      padding:12px 12px;border-radius:999px;
      border:1px solid rgba(0,0,0,.08);
      background:rgba(255,255,255,.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 14px 34px rgba(0,0,0,.06);
    }
    .search input{
      width:100%;border:0;outline:0;background:transparent;
      font-size:13.5px;color:var(--text);
    }
    .hint{font-size:12.5px;color:var(--muted);white-space:nowrap}

    .grid{
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap:12px;
      padding:0 14px;
    }
    .card{
      grid-column: span 6;
      border-radius:var(--radius);
      border:1px solid rgba(0,0,0,.08);
      background:var(--card);
      box-shadow:var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      overflow:hidden;
    }
    @media (max-width: 860px){ .card{grid-column: span 12;} }

    .cardHead{
      padding:14px 14px 10px;
      display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
      border-bottom:1px solid rgba(0,0,0,.06);
      background:linear-gradient(180deg, rgba(255,255,255,.55), rgba(255,255,255,.28));
    }
    .meta{display:flex;flex-direction:column;gap:4px}
    .meta .date{font-size:12.5px;color:var(--muted)}
    .meta .match{font-size:14.5px;font-weight:650;letter-spacing:.2px}

    .tag{
      padding:8px 10px;border-radius:999px;
      border:1px solid rgba(0,0,0,.10);
      background:rgba(255,255,255,.50);
      font-size:12.5px;
      white-space:nowrap;
    }

    .cardBody{padding:12px 14px 14px}
    .teams{
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      margin-bottom:10px;
    }
    .team{display:flex;align-items:center;gap:10px;min-width:0}
    .logo{
      width:34px;height:34px;border-radius:12px;
      border:1px solid rgba(0,0,0,.10);
      background:rgba(255,255,255,.65);
      display:grid;place-items:center;
      overflow:hidden;
    }
    .logo img{width:26px;height:26px;display:block}
    .abbr{font-weight:700;letter-spacing:.6px;font-size:14px}
    .vs{
      font-size:12.5px;color:var(--muted);
      padding:6px 10px;border-radius:999px;
      border:1px solid rgba(0,0,0,.08);
      background:rgba(255,255,255,.45);
    }

    .split{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
      margin-top:10px;
    }
    @media (max-width: 520px){ .split{grid-template-columns:1fr;} }

    .box{
      padding:10px 12px;border-radius:14px;
      border:1px solid rgba(0,0,0,.08);
      background:rgba(255,255,255,.50);
    }
    .boxTitle{
      font-size:12px;color:var(--muted);
      margin:0 0 6px;
      letter-spacing:.25px;
      text-transform:uppercase;
    }
    .big{
      font-size:14px;font-weight:750;letter-spacing:.2px;margin:0 0 6px;
    }
    ul{
      margin:0;
      padding-left:16px;
      color:rgba(0,0,0,.75);
      font-size:13px;
      line-height:1.45;
    }

    footer{padding:22px 14px 0;color:var(--muted);font-size:12.5px}
    .note{
      border:1px solid rgba(0,0,0,.08);
      background:rgba(255,255,255,.55);
      border-radius:14px;
      padding:12px 12px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 12px 30px rgba(0,0,0,.05);
    }
    .muted{color:var(--muted)}
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <div class="mark" aria-hidden="true"></div>
        <div>
          <h1>MLB 2026 Picks Journal</h1>
          <div class="sub">Results you update after games finish</div>
        </div>
      </div>

      <nav>
        <a class="pill" href="./index.html">Upcoming <small>2026</small></a>
        <a class="pill active" href="./results.html">Results <small>Journal</small></a>
      </nav>
    </header>

    <div class="topbar">
      <div class="search" role="search">
        <span class="muted" aria-hidden="true">Search</span>
        <input id="q" type="search" placeholder="Try: NYY, LAD, 04/02, final..." autocomplete="off" />
      </div>
      <div class="hint" id="count"></div>
    </div>

    <main class="grid" id="list"></main>

    <footer>
      <div class="note">
        <div><strong>Workflow:</strong> After a game ends, add an entry here with the final score and any quick notes. Keep it clean, like a logbook.</div>
        <div class="muted">This page also auto sorts newest to oldest by date/time.</div>
      </div>
    </footer>
  </div>

  <script>
    const TEAM = {
      ARI:{id:109}, ATL:{id:144}, BAL:{id:110}, BOS:{id:111}, CHC:{id:112},
      CWS:{id:145}, CIN:{id:113}, CLE:{id:114}, COL:{id:115}, DET:{id:116},
      HOU:{id:117}, KCR:{id:118}, LAA:{id:108}, LAD:{id:119}, MIA:{id:146},
      MIL:{id:158}, MIN:{id:142}, NYM:{id:121}, NYY:{id:147}, OAK:{id:133},
      PHI:{id:143}, PIT:{id:134}, SDP:{id:135}, SEA:{id:136}, SFG:{id:137},
      STL:{id:138}, TBR:{id:139}, TEX:{id:140}, TOR:{id:141}, WSN:{id:120}
    };

    function logoUrl(abbr){
      const t = TEAM[abbr];
      if(!t) return null;
      return `https://www.mlbstatic.com/team-logos/team-cap-on-light/${t.id}.svg`;
    }

    function logoFallbackHTML(abbr){
      return `
        <div style="
          width:26px;height:26px;border-radius:10px;
          display:grid;place-items:center;
          font-weight:800;font-size:10px;letter-spacing:.6px;
          color:rgba(0,0,0,.72);
          background:rgba(0,0,0,.04);
          border:1px solid rgba(0,0,0,.10);
        ">${abbr}</div>
      `;
    }

    function fmtDate(iso){
      const d = new Date(iso + "T00:00:00");
      return d.toLocaleDateString(undefined, { weekday:"short", month:"short", day:"numeric", year:"numeric" });
    }

    function parseGameDateTime(dateISO, timeET){
      try{
        const m = String(timeET || "").match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);
        let hh = 0, mm = 0;
        if(m){
          hh = parseInt(m[1], 10);
          mm = parseInt(m[2], 10);
          const ap = m[3].toUpperCase();
          if(ap === "PM" && hh !== 12) hh += 12;
          if(ap === "AM" && hh === 12) hh = 0;
        }
        return new Date(`${dateISO}T${String(hh).padStart(2,"0")}:${String(mm).padStart(2,"0")}:00`);
      }catch{
        return new Date(dateISO + "T00:00:00");
      }
    }

    // Results entries: you will update these after games.
    // Fields:
    //  - date, timeET, away, home
    //  - pick, why
    //  - final (example: "LAD 6, SFG 2")
    //  - notes (short bullets)
    const RESULTS = [
      {
        date: "2026-04-02",
        timeET: "4:10 PM ET",
        away: "LAD",
        home: "SFG",
        pick: "LAD",
        why: [
          "Top of lineup gets on base",
          "Platoon matchups look favorable"
        ],
        final: "LAD 6, SFG 2",
        notes: [
          "Early runs, then coasted",
          "Bullpen clean finish"
        ]
      }
    ];

    const listEl = document.getElementById("list");
    const qEl = document.getElementById("q");
    const countEl = document.getElementById("count");

    function sortNewestFirst(arr){
      return arr.slice().sort((a,b) => {
        const da = parseGameDateTime(a.date, a.timeET).getTime();
        const db = parseGameDateTime(b.date, b.timeET).getTime();
        return db - da;
      });
    }

    function render(items){
      listEl.innerHTML = "";
      items.forEach(g => {
        const awayLogo = logoUrl(g.away);
        const homeLogo = logoUrl(g.home);

        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <div class="cardHead">
            <div class="meta">
              <div class="date">${fmtDate(g.date)}  •  ${g.timeET || ""}</div>
              <div class="match">${g.away} @ ${g.home}</div>
            </div>
            <div class="tag">Final: <strong>${g.final || "TBD"}</strong></div>
          </div>

          <div class="cardBody">
            <div class="teams">
              <div class="team">
                <div class="logo" data-abbr="${g.away}">
                  ${awayLogo ? `<img alt="${g.away} logo" src="${awayLogo}" />` : logoFallbackHTML(g.away)}
                </div>
                <div class="abbr">${g.away}</div>
              </div>

              <div class="vs">VS</div>

              <div class="team" style="justify-content:flex-end">
                <div class="abbr">${g.home}</div>
                <div class="logo" data-abbr="${g.home}">
                  ${homeLogo ? `<img alt="${g.home} logo" src="${homeLogo}" />` : logoFallbackHTML(g.home)}
                </div>
              </div>
            </div>

            <div class="split">
              <div class="box">
                <p class="boxTitle">Your pick</p>
                <p class="big">${g.pick}</p>
                <ul>${(g.why || []).map(x => `<li>${x}</li>`).join("")}</ul>
              </div>

              <div class="box">
                <p class="boxTitle">Outcome notes</p>
                <p class="big">${g.final || "TBD"}</p>
                <ul>${(g.notes || []).map(x => `<li>${x}</li>`).join("")}</ul>
              </div>
            </div>
          </div>
        `;
        listEl.appendChild(card);
      });

      listEl.querySelectorAll(".logo img").forEach(img => {
        img.addEventListener("error", (e) => {
          const wrap = e.target.closest(".logo");
          const abbr = wrap.getAttribute("data-abbr") || "";
          wrap.innerHTML = logoFallbackHTML(abbr);
        });
      });

      countEl.textContent = `${items.length} entr${items.length === 1 ? "y" : "ies"}`;
    }

    function applyFilter(){
      const q = (qEl.value || "").trim().toUpperCase();
      let items = sortNewestFirst(RESULTS);

      if(q){
        items = items.filter(g => {
          const hay = `${g.date} ${g.timeET || ""} ${g.away} ${g.home} ${g.pick} ${g.final || ""} ${(g.why||[]).join(" ")} ${(g.notes||[]).join(" ")}`.toUpperCase();
          return hay.includes(q);
        });
      }

      render(items);
    }

    qEl.addEventListener("input", applyFilter);
    applyFilter();
  </script>
</body>
</html>
