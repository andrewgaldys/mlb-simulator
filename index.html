<!-- index.html (UPDATED) -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MLB 2026 | Upcoming</title>
  <meta name="description" content="Upcoming MLB regular season games in 2026 with picks." />
  <style>

    .gameId{
  position:absolute;
  bottom:8px;
  right:12px;
  font-size:10px;
  color:rgba(0,0,0,.35);
  font-weight:500;
  letter-spacing:.5px;
}

    .siteTitle{
  font-size:26px;
  font-weight:800;
  letter-spacing:.4px;
  margin:0;
}
    
    :root{
      --bg0:#ffffff;
      --bg1:#f3f4f6;
      --card:rgba(255,255,255,.62);
      --stroke:rgba(0,0,0,.08);
      --text:#0b0b0c;
      --muted:rgba(0,0,0,.62);
      --shadow: 0 18px 45px rgba(0,0,0,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color:var(--text);
      background:
        radial-gradient(900px 500px at 15% 10%, rgba(0,0,0,.05), transparent 60%),
        radial-gradient(900px 500px at 85% 20%, rgba(0,0,0,.04), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
    }
    .wrap{max-width:1100px;margin:0 auto;padding:28px 18px 40px}
    header{
      display:flex;gap:14px;align-items:center;justify-content:space-between;
      padding:14px 14px 18px;
    }
    .brand{display:flex;gap:12px;align-items:center}

    .titleBlock{display:flex;flex-direction:column;gap:4px}
    h1{font-size:18px;margin:0;letter-spacing:.2px}
    .sub{font-size:12.5px;color:var(--muted);margin:0}
    .sub a{color:inherit;text-decoration:none;border-bottom:1px solid rgba(0,0,0,.18)}
    .sub a:hover{border-bottom-color:rgba(0,0,0,.35)}
    nav{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .pill{
      display:inline-flex;align-items:center;
      padding:10px 12px;border-radius:999px;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      text-decoration:none;color:var(--text);
      box-shadow: 0 10px 24px rgba(0,0,0,.05);
      font-size:13px;
    }
    .pill.active{background:rgba(0,0,0,.07)}
    .controls{
      display:flex;gap:10px;align-items:center;justify-content:space-between;
      padding:0 14px 18px;
      flex-wrap:wrap;
    }
    .filterGroup{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .selectWrap{
      display:flex;align-items:center;gap:10px;
      padding:10px 12px;border-radius:999px;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 14px 34px rgba(0,0,0,.06);
    }
    .label{font-size:12.5px;color:var(--muted);white-space:nowrap}
    select{
      border:0;outline:0;background:transparent;
      font-size:13.5px;color:var(--text);
      padding:2px 0;
      max-width:220px;
    }
    .hint{font-size:12.5px;color:var(--muted);white-space:nowrap}
    .grid{
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap:12px;
      padding:0 14px;
    }
    .card{
      grid-column: span 6;
      border-radius:var(--radius);
      border:1px solid var(--stroke);
      background:var(--card);
      box-shadow:var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      overflow:hidden;
    }
    @media (max-width: 860px){ .card{grid-column: span 12;} }
    .cardHead{
      padding:14px 14px 10px;
      display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
      border-bottom:1px solid rgba(0,0,0,.06);
      background:linear-gradient(180deg, rgba(255,255,255,.55), rgba(255,255,255,.28));
    }
    .meta{display:flex;flex-direction:column;gap:4px}
    .meta .date{font-size:12.5px;color:var(--muted)}
    .meta .match{font-size:14.5px;font-weight:650;letter-spacing:.2px}
    .badge{
      padding:8px 10px;border-radius:999px;
      border:1px solid rgba(0,0,0,.10);
      background:rgba(255,255,255,.50);
      font-size:12.5px;
      white-space:nowrap;
    }
    .cardBody{
  padding:12px 14px 14px;
  position:relative;
}
    .teams{
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      margin-bottom:10px;
    }
    .team{display:flex;align-items:center;gap:10px;min-width:0}
    .logo{
      width:34px;height:34px;border-radius:12px;
      border:1px solid rgba(0,0,0,.10);
      background:rgba(255,255,255,.65);
      display:grid;place-items:center;
      overflow:hidden;
    }
    .logo img{width:26px;height:26px;display:block}
    .abbr{font-weight:700;letter-spacing:.6px;font-size:14px}
    .vs{
      font-size:12.5px;color:var(--muted);
      padding:6px 10px;border-radius:999px;
      border:1px solid rgba(0,0,0,.08);
      background:rgba(255,255,255,.45);
    }
    .why{
      margin-top:10px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(0,0,0,.08);
      background:rgba(255,255,255,.50);
      font-size:13px;
      color:rgba(0,0,0,.75);
    }
    .empty{
      grid-column: span 12;
      border-radius:var(--radius);
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 14px 34px rgba(0,0,0,.06);
      padding:14px;
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
    }
  </style>
</head>

<body>
  <div class="wrap">

<header>
  <div class="brand">
    <div class="titleBlock">
      <h1 class="siteTitle">baseballpicks.io</h1>
      <p class="sub">
        Picks from
        <a href="https://www.linkedin.com/in/andrewgaldys/" target="_blank" rel="noopener noreferrer">Andrew Galdys</a>
        and
        <a href="https://www.linkedin.com/in/jordan-mongitore-524b84381/" target="_blank" rel="noopener noreferrer">Jordan Mongitore</a>.
      </p>
    </div>
  </div>

  <nav>
    <a class="pill active" href="./index.html">Upcoming</a>
    <a class="pill" href="./results.html">Results</a>
  </nav>
</header>

    <div class="controls">
      <div class="filterGroup">
        <div class="selectWrap">
          <span class="label">Team</span>
          <select id="teamFilter" aria-label="Filter by team">
            <option value="ALL">All</option>
          </select>
        </div>

        <div class="selectWrap">
          <span class="label">Date</span>
          <select id="dateFilter" aria-label="Filter by date">
            <option value="ALL">All</option>
          </select>
        </div>
      </div>

      <div class="hint" id="count"></div>
    </div>

    <main class="grid" id="list"></main>
  </div>

  <script>
    // Regular season only + official MLB teams only (30 teams)
    const MLB_TEAM_IDS = new Set([
      108,109,110,111,112,113,114,115,116,117,
      118,119,120,121,133,134,135,136,137,138,
      139,140,141,142,143,144,145,146,147,158
    ]);

    const START = new Date("2026-02-28T00:00:00Z");
    const END   = new Date("2026-12-31T23:59:59Z");
    const TZ = "America/New_York";

    function logoUrlByTeamId(teamId){
      if(!teamId) return null;
      return `https://www.mlbstatic.com/team-logos/team-cap-on-light/${teamId}.svg`;
    }

    function logoFallbackHTML(abbr){
      const safe = (abbr || "").slice(0,4);
      return `
        <div style="
          width:26px;height:26px;border-radius:10px;
          display:grid;place-items:center;
          font-weight:800;font-size:10px;letter-spacing:.6px;
          color:rgba(0,0,0,.72);
          background:rgba(0,0,0,.04);
          border:1px solid rgba(0,0,0,.10);
        ">${safe || "TBD"}</div>
      `;
    }

    function fmtDateTimeET(iso){
      const d = new Date(iso);
      const date = new Intl.DateTimeFormat(undefined, {
        timeZone: TZ, weekday:"short", month:"short", day:"numeric", year:"numeric"
      }).format(d);
      const time = new Intl.DateTimeFormat(undefined, {
        timeZone: TZ, hour:"numeric", minute:"2-digit"
      }).format(d);
      return { date, time: `${time} ET` };
    }

    function dayKeyET(iso){
      const d = new Date(iso);
      return new Intl.DateTimeFormat("en-CA", {
        timeZone: TZ, year:"numeric", month:"2-digit", day:"2-digit"
      }).format(d);
    }

    async function fetchSchedule2026(){
      const url = new URL("https://statsapi.mlb.com/api/v1/schedule");
      url.searchParams.set("sportId", "1");
      url.searchParams.set("gameTypes", "S,R"); // Spring Training and Regular Season
      url.searchParams.set("startDate", "2026-02-28");
      url.searchParams.set("endDate", "2026-12-31");
      url.searchParams.set("hydrate", "team");
      const res = await fetch(url.toString());
      if(!res.ok) throw new Error(`Schedule fetch failed (${res.status})`);
      return res.json();
    }

    async function fetchPicks(){
      const res = await fetch("./picks.json", { cache: "no-store" });
      if(!res.ok) return {};
      return res.json();
    }

    function flattenSchedule(json){
      const out = [];
      const dates = Array.isArray(json?.dates) ? json.dates : [];
      for(const day of dates){
        const games = Array.isArray(day?.games) ? day.games : [];
        for(const g of games){
          const gameDate = g?.gameDate;
          if(!gameDate) continue;
          const dt = new Date(gameDate);
          if(dt < START || dt > END) continue;

          const awayTeam = g?.teams?.away?.team || {};
          const homeTeam = g?.teams?.home?.team || {};

          const awayId = awayTeam?.id;
          const homeId = homeTeam?.id;

          // Only keep real MLB vs MLB matchups
          if(!MLB_TEAM_IDS.has(awayId) || !MLB_TEAM_IDS.has(homeId)) continue;

          out.push({
            gamePk: g?.gamePk,
            gameDate,
            dayKey: dayKeyET(gameDate),
            awayAbbr: awayTeam?.abbreviation || "",
            homeAbbr: homeTeam?.abbreviation || "",
            awayId,
            homeId
          });
        }
      }
      out.sort((a,b) => new Date(a.gameDate) - new Date(b.gameDate));
      return out;
    }

    const listEl = document.getElementById("list");
    const countEl = document.getElementById("count");
    const teamFilterEl = document.getElementById("teamFilter");
    const dateFilterEl = document.getElementById("dateFilter");

    let ALL_GAMES = [];
    let PICKS = {};

    function buildFilters(games){
      const teamSet = new Set();
      const dateSet = new Set();

      for(const g of games){
        if(g.awayAbbr) teamSet.add(g.awayAbbr);
        if(g.homeAbbr) teamSet.add(g.homeAbbr);
        if(g.dayKey) dateSet.add(g.dayKey);
      }

      const teams = Array.from(teamSet).sort();
      const dates = Array.from(dateSet).sort();

      teamFilterEl.innerHTML = `<option value="ALL">All</option>` + teams.map(t => `<option value="${t}">${t}</option>`).join("");
      dateFilterEl.innerHTML = `<option value="ALL">All</option>` + dates.map(d => `<option value="${d}">${d}</option>`).join("");
    }

    function applyFilters(){
      const teamVal = teamFilterEl.value;
      const dateVal = dateFilterEl.value;

      let items = ALL_GAMES.slice();

      if(teamVal !== "ALL"){
        items = items.filter(g => g.awayAbbr === teamVal || g.homeAbbr === teamVal);
      }
      if(dateVal !== "ALL"){
        items = items.filter(g => g.dayKey === dateVal);
      }

      render(items);
    }

    function render(items){
      listEl.innerHTML = "";

      if(!items.length){
        listEl.innerHTML = `<div class="empty">No games match these filters.</div>`;
        countEl.textContent = "0 games";
        return;
      }

      items.forEach(g => {
        const pk = String(g.gamePk || "");
        const entry = PICKS?.[pk] || {};
        const pick = entry?.pick || "TBD";

        const awayLogo = logoUrlByTeamId(g.awayId);
        const homeLogo = logoUrlByTeamId(g.homeId);
        const dt = fmtDateTimeET(g.gameDate);

        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <div class="cardHead">
            <div class="meta">
              <div class="date">${dt.date}  •  ${dt.time}</div>
              <div class="match">${g.awayAbbr} @ ${g.homeAbbr}</div>
            </div>
            <div class="badge">Pick: <strong>${pick}</strong></div>
          </div>

          <div class="cardBody">
            <div class="teams">
              <div class="team">
                <div class="logo" data-fallback="${g.awayAbbr}">
                  ${awayLogo ? `<img alt="${g.awayAbbr} logo" src="${awayLogo}" />` : logoFallbackHTML(g.awayAbbr)}
                </div>
                <div class="abbr">${g.awayAbbr}</div>
              </div>

              <div class="vs">VS</div>

              <div class="team" style="justify-content:flex-end">
                <div class="abbr">${g.homeAbbr}</div>
                <div class="logo" data-fallback="${g.homeAbbr}">
                  ${homeLogo ? `<img alt="${g.homeAbbr} logo" src="${homeLogo}" />` : logoFallbackHTML(g.homeAbbr)}
                </div>
              </div>
            </div>

            <div class="why">TBD</div>
            <div class="gameId">${g.gamePk}</div>
          </div>
        `;
        listEl.appendChild(card);
      });

      listEl.querySelectorAll(".logo img").forEach(img => {
        img.addEventListener("error", (e) => {
          const wrap = e.target.closest(".logo");
          const abbr = wrap.getAttribute("data-fallback") || "";
          wrap.innerHTML = logoFallbackHTML(abbr);
        });
      });

      countEl.textContent = `${items.length} game${items.length === 1 ? "" : "s"}`;
    }

    async function boot(){
      try{
        const [scheduleJson, picks] = await Promise.all([fetchSchedule2026(), fetchPicks()]);
        PICKS = picks || {};
        ALL_GAMES = flattenSchedule(scheduleJson);

        buildFilters(ALL_GAMES);

        teamFilterEl.addEventListener("change", applyFilters);
        dateFilterEl.addEventListener("change", applyFilters);

        applyFilters();
      }catch(err){
        listEl.innerHTML = `<div class="empty">Could not load schedule. ${String(err?.message || err)}</div>`;
        countEl.textContent = "";
      }
    }

    boot();
  </script>
</body>
</html>
